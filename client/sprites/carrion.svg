<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 24">
  <defs>
    <radialGradient id="boneGrad" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#C8B8A0"/>
      <stop offset="50%" stop-color="#A89078"/>
      <stop offset="100%" stop-color="#887060"/>
    </radialGradient>
  </defs>
  <g transform="translate(15,12)">
    <!-- Skull -->
    <ellipse cx="0" cy="0" rx="9" ry="7" fill="url(#boneGrad)"/>
    <!-- Eye sockets -->
    <ellipse cx="-3" cy="-1" rx="3.5" ry="3" fill="#2A1A0E"/>
    <ellipse cx="4" cy="-1" rx="3.5" ry="3" fill="#2A1A0E"/>
    <!-- Nose cavity -->
    <path d="M-1,2 Q0,0 1,2 Q0,4 -1,2Z" fill="#2A1A0E"/>
    <!-- Jaw -->
    <path d="M-6,4 Q0,8 6,4" fill="none" stroke="#A89078" stroke-width="2" stroke-linecap="round"/>
    <line x1="-4" y1="5" x2="-2" y2="3" stroke="#887060" stroke-width="0.8"/>
    <line x1="4" y1="5" x2="2" y2="3" stroke="#887060" stroke-width="0.8"/>
    <line x1="0" y1="6" x2="0" y2="3" stroke="#887060" stroke-width="0.8"/>
    <!-- Crack -->
    <path d="M4,-4 Q6,-2 5,0" fill="none" stroke="#887060" stroke-width="0.8" opacity="0.5"/>
    <!-- Crossbones -->
    <g opacity="0.7">
      <line x1="-12" y1="10" x2="-2" y2="6" stroke="#A89078" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-2" y1="10" x2="-12" y2="6" stroke="#A89078" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="-7" cy="8" r="2" fill="none" stroke="#A89078" stroke-width="1.5"/>
    </g>
  </g>
</svg>
