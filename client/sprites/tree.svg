<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 60">
  <defs>
    <linearGradient id="trunkGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5A3E1E"/>
      <stop offset="50%" stop-color="#7A5A30"/>
      <stop offset="100%" stop-color="#4A3218"/>
    </linearGradient>
    <radialGradient id="foliageGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#44AA44"/>
      <stop offset="60%" stop-color="#2D8A2D"/>
      <stop offset="100%" stop-color="#1A6A1A"/>
    </radialGradient>
  </defs>
  <g transform="translate(15,60)">
    <!-- Trunk -->
    <rect x="-3" y="-30" width="6" height="30" rx="1.5" fill="url(#trunkGrad)"/>
    <!-- Foliage layers -->
    <polygon points="0,-55 -14,-28 14,-28" fill="url(#foliageGrad)"/>
    <polygon points="0,-45 -12,-22 12,-22" fill="#2D8A2D"/>
    <polygon points="0,-60 -10,-35 10,-35" fill="#44AA44"/>
    <!-- Top highlight -->
    <polygon points="0,-58 -5,-42 5,-42" fill="#55BB55" opacity="0.5"/>
    <!-- Shadow -->
    <polygon points="0,-50 5,-35 10,-35" fill="#1A5A1A" opacity="0.3"/>
  </g>
</svg>
