<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="body" cx="45%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#C4A47A"/>
      <stop offset="60%" stop-color="#A0805A"/>
      <stop offset="100%" stop-color="#7A5E3C"/>
    </radialGradient>
    <linearGradient id="wingGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B7355"/>
      <stop offset="100%" stop-color="#5C4A32"/>
    </linearGradient>
  </defs>
  <g transform="translate(50,50)">
    <!-- Tail -->
    <polygon points="-30,8 -48,-5 -45,15" fill="#5C4A32"/>
    <polygon points="-28,12 -45,20 -42,28" fill="#7A5E3C"/>
    <!-- Body -->
    <ellipse cx="-5" cy="2" rx="30" ry="18" fill="url(#body)"/>
    <!-- Wing -->
    <path d="M-10,-12 Q5,-42 35,-15 Q20,-8 -5,-8Z" fill="url(#wingGrad)"/>
    <path d="M-5,-10 Q10,-30 30,-12" fill="none" stroke="#6B553E" stroke-width="0.8"/>
    <!-- Head -->
    <circle cx="28" cy="-8" r="13" fill="url(#body)"/>
    <!-- Beak -->
    <polygon points="38,-10 52,-7 38,-3" fill="#D4A843"/>
    <line x1="38" y1="-7" x2="50" y2="-7" stroke="#B8922E" stroke-width="0.8"/>
    <!-- Eye -->
    <circle cx="32" cy="-12" r="3.5" fill="#1a1a1a"/>
    <circle cx="33" cy="-13" r="1.5" fill="white"/>
    <!-- Cheek patch -->
    <ellipse cx="22" cy="-2" rx="4" ry="3" fill="#C4956A" opacity="0.6"/>
  </g>
</svg>
