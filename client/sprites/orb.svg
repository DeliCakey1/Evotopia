<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#D080FF"/>
      <stop offset="60%" stop-color="#9B59B6"/>
      <stop offset="100%" stop-color="#6C3483" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9B59B6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#9B59B6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="highlight" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g transform="translate(20,20)">
    <circle cx="0" cy="0" r="16" fill="url(#outerGlow)"/>
    <circle cx="0" cy="0" r="10" fill="#9B59B6" opacity="0.3"/>
    <circle cx="0" cy="0" r="7" fill="url(#coreGlow)"/>
    <ellipse cx="0" cy="0" rx="8" ry="2" fill="none" stroke="#D080FF" stroke-width="0.6" opacity="0.5" transform="rotate(-25)"/>
    <ellipse cx="0" cy="0" rx="8" ry="2" fill="none" stroke="#E8A0FF" stroke-width="0.4" opacity="0.4" transform="rotate(45)"/>
    <circle cx="-3" cy="-2" r="3" fill="url(#highlight)"/>
    <circle cx="-4" cy="-3" r="1.5" fill="white" opacity="0.3"/>
    <circle cx="-7" cy="-6" r="1" fill="white" opacity="0.6"/>
    <circle cx="6" cy="-4" r="0.7" fill="white" opacity="0.4"/>
    <circle cx="-5" cy="5" r="0.5" fill="white" opacity="0.3"/>
    <circle cx="3" cy="6" r="0.6" fill="white" opacity="0.35"/>
  </g>
