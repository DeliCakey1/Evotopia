<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="orbBody" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#D080FF"/>
      <stop offset="40%" stop-color="#9B59B6"/>
      <stop offset="100%" stop-color="#6C3483"/>
    </radialGradient>
    <radialGradient id="orbHighlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g transform="translate(16,16)">
    <!-- Glow effect -->
    <circle cx="0" cy="0" r="10" fill="#9B59B6" opacity="0.3" filter="url(#glow)"/>
    <!-- Orb body -->
    <circle cx="0" cy="1" r="7" fill="url(#orbBody)"/>
    <!-- Highlight -->
    <circle cx="-2" cy="-1" r="3.5" fill="url(#orbHighlight)"/>
    <!-- Secondary highlight -->
    <circle cx="-3" cy="-2" r="1.5" fill="white" opacity="0.2"/>
    <!-- Ring detail -->
    <ellipse cx="0" cy="0" rx="7" ry="2" fill="none" stroke="#D080FF" stroke-width="0.5" opacity="0.4" transform="rotate(-20)"/>
  </g>
</svg>
