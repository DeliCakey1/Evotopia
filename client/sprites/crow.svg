<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="body" cx="40%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#3D3D3D"/>
      <stop offset="50%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#111111"/>
    </radialGradient>
    <linearGradient id="wingGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#333333"/>
      <stop offset="100%" stop-color="#0D0D0D"/>
    </linearGradient>
  </defs>
  <g transform="translate(50,50)">
    <!-- Tail -->
    <polygon points="-32,5 -55,-10 -50,15" fill="#111"/>
    <polygon points="-30,10 -48,20 -44,28" fill="#1A1A1A"/>
    <!-- Body -->
    <ellipse cx="-3" cy="2" rx="32" ry="17" fill="url(#body)"/>
    <!-- Wing -->
    <path d="M-8,-10 Q5,-45 38,-18 Q20,-6 -8,-6Z" fill="url(#wingGrad)"/>
    <path d="M-5,-8 Q5,-30 30,-12" fill="none" stroke="#222" stroke-width="0.8"/>
    <!-- Head -->
    <circle cx="32" cy="-10" r="14" fill="url(#body)"/>
    <!-- Beak -->
    <polygon points="42,-12 60,-6 42,-2" fill="#444"/>
    <line x1="42" y1="-7" x2="58" y2="-7" stroke="#333" stroke-width="0.8"/>
    <!-- Eye -->
    <circle cx="36" cy="-14" r="3" fill="#1a1a1a"/>
    <circle cx="36.5" cy="-14.5" r="1.2" fill="white"/>
    <circle cx="36.5" cy="-14.5" r="0.6" fill="#444"/>
  </g>
</svg>
