<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="berryBody" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FF8DB5"/>
      <stop offset="40%" stop-color="#FF4D85"/>
      <stop offset="100%" stop-color="#CC0055"/>
    </radialGradient>
    <radialGradient id="highlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g transform="translate(16,16)">
    <!-- Berry body -->
    <circle cx="0" cy="2" r="8" fill="url(#berryBody)"/>
    <circle cx="-2" cy="0" r="4" fill="url(#highlight)"/>
    <!-- Leaf -->
    <path d="M0,-6 Q-3,-10 2,-12 Q3,-10 0,-6Z" fill="#44BB44"/>
    <line x1="0" y1="-6" x2="1" y2="-10" stroke="#338833" stroke-width="0.6"/>
    <!-- Stem -->
    <line x1="0" y1="-6" x2="0" y2="-12" stroke="#338833" stroke-width="1"/>
    <!-- Seeds -->
    <circle cx="2" cy="4" r="1" fill="#CC0048" opacity="0.6"/>
    <circle cx="-1" cy="6" r="1" fill="#CC0048" opacity="0.6"/>
    <circle cx="-3" cy="2" r="1" fill="#CC0048" opacity="0.6"/>
  </g>
</svg>
