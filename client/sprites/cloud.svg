<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60">
  <defs>
    <radialGradient id="cloudGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="70%" stop-color="#F0F4F8"/>
      <stop offset="100%" stop-color="#D0D8E0"/>
    </radialGradient>
  </defs>
  <g transform="translate(50,30)">
    <!-- Cloud base -->
    <ellipse cx="0" cy="5" rx="40" ry="12" fill="url(#cloudGrad)"/>
    <!-- Cloud puffs -->
    <circle cx="-20" cy="-2" r="14" fill="url(#cloudGrad)"/>
    <circle cx="0" cy="-8" r="18" fill="url(#cloudGrad)"/>
    <circle cx="22" cy="-3" r="15" fill="url(#cloudGrad)"/>
    <circle cx="-10" cy="-12" r="10" fill="url(#cloudGrad)"/>
    <circle cx="12" cy="-12" r="11" fill="url(#cloudGrad)"/>
    <!-- Soft highlights -->
    <ellipse cx="0" cy="-14" rx="25" ry="8" fill="white" opacity="0.2"/>
  </g>
</svg>
