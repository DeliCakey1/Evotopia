<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="body" cx="45%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#8855CC"/>
      <stop offset="50%" stop-color="#663399"/>
      <stop offset="100%" stop-color="#442266"/>
    </radialGradient>
    <linearGradient id="wingGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7744AA"/>
      <stop offset="50%" stop-color="#552288"/>
      <stop offset="100%" stop-color="#331166"/>
    </linearGradient>
    <linearGradient id="bellyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#AA77DD"/>
      <stop offset="100%" stop-color="#8855BB"/>
    </linearGradient>
    <radialGradient id="eyeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FF00"/>
      <stop offset="60%" stop-color="#00CC00"/>
      <stop offset="100%" stop-color="#006600"/>
    </radialGradient>
  </defs>
  <g transform="translate(50,50)">
    <!-- Tail -->
    <path d="M-30,8 Q-45,15 -55,10 Q-50,20 -60,25 Q-48,15 -42,18 Q-38,25 -35,20 Q-30,18 -28,14Z" fill="url(#body)"/>
    <!-- Tail spike -->
    <polygon points="-58,12 -65,8 -62,18" fill="#331166"/>
    <!-- Body -->
    <ellipse cx="-2" cy="2" rx="34" ry="20" fill="url(#body)"/>
    <!-- Belly -->
    <ellipse cx="0" cy="10" rx="24" ry="10" fill="url(#bellyGrad)" opacity="0.5"/>
    <!-- Back spikes -->
    <polygon points="-18,-18 -20,-28 -14,-20" fill="#442266"/>
    <polygon points="-10,-20 -10,-30 -5,-22" fill="#553388"/>
    <polygon points="0,-20 2,-30 6,-22" fill="#442266"/>
    <polygon points="10,-18 14,-28 16,-20" fill="#553388"/>
    <!-- Wing - bat-like -->
    <path d="M-12,-6 Q0,-55 45,-22 Q25,-10 15,-8 Q12,-25 5,-15 Q-5,-30 -12,-6Z" fill="url(#wingGrad)"/>
    <path d="M-10,-8 Q2,-40 35,-15" fill="none" stroke="#331166" stroke-width="1.2"/>
    <path d="M-8,-6 Q8,-30 22,-10" fill="none" stroke="#331166" stroke-width="0.8"/>
    <!-- Head - broader -->
    <circle cx="33" cy="-10" r="16" fill="url(#body)"/>
    <!-- Horns -->
    <polygon points="26,-25 22,-38 30,-28" fill="#442266"/>
    <polygon points="34,-26 36,-40 38,-28" fill="#553388"/>
    <!-- Snout/upper jaw -->
    <ellipse cx="50" cy="-6" rx="10" ry="5" fill="url(#body)"/>
    <!-- Lower jaw -->
    <path d="M46,-2 Q52,4 46,2" fill="#442266" opacity="0.8"/>
    <!-- Teeth -->
    <polygon points="48,-4 50,-6 50,-4Z" fill="white" opacity="0.7"/>
    <polygon points="52,-4 54,-6 53,-4Z" fill="white" opacity="0.7"/>
    <polygon points="44,-2 46,-4 46,-2Z" fill="white" opacity="0.6"/>
    <!-- Eye -->
    <circle cx="36" cy="-14" r="5" fill="#1a1a1a"/>
    <circle cx="36" cy="-14" r="3.5" fill="url(#eyeGrad)"/>
    <circle cx="37" cy="-15.5" r="1.5" fill="white"/>
    <!-- Nostril -->
    <circle cx="54" cy="-7" r="1.5" fill="#331166"/>
    <!-- Wing membrane detail -->
    <path d="M15,-8 Q18,-18 12,-12" fill="none" stroke="#442266" stroke-width="0.6" opacity="0.5"/>
  </g>
</svg>
