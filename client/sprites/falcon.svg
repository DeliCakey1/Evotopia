<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bodyGrad" cx="45%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#8A9AAC"/>
      <stop offset="50%" stop-color="#6B7B8B"/>
      <stop offset="100%" stop-color="#4A5A6A"/>
    </radialGradient>
    <linearGradient id="wingGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A6A7A"/>
      <stop offset="100%" stop-color="#3A4A5A"/>
    </linearGradient>
    <linearGradient id="chestGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D6D6D6"/>
      <stop offset="100%" stop-color="#B0B8C0"/>
    </linearGradient>
  </defs>
  <g transform="translate(50,50)">
    <!-- Tail -->
    <polygon points="-28,5 -48,-8 -44,14" fill="#3A4A5A"/>
    <polygon points="-26,10 -42,18 -38,26" fill="#4A5A6A"/>
    <!-- Body - sleek -->
    <ellipse cx="-2" cy="2" rx="30" ry="16" fill="url(#bodyGrad)"/>
    <!-- Chest -->
    <ellipse cx="8" cy="6" rx="12" ry="11" fill="url(#chestGrad)" opacity="0.5"/>
    <!-- Wing - swept back, pointed -->
    <path d="M-10,-8 Q0,-48 42,-22 Q22,-4 -10,-4Z" fill="url(#wingGrad)"/>
    <path d="M-8,-6 Q5,-36 35,-12" fill="none" stroke="#4A5A6A" stroke-width="0.8"/>
    <path d="M-6,-4 Q8,-24 26,-8" fill="none" stroke="#4A5A6A" stroke-width="0.6"/>
    <!-- Head -->
    <ellipse cx="32" cy="-10" rx="13" ry="11" fill="url(#bodyGrad)"/>
    <!-- Dark hood/mask marking -->
    <path d="M24,-18 Q32,-20 40,-16 Q42,-12 40,-8 Q34,-12 28,-10 Q24,-14 24,-18Z" fill="#2A3A4A" opacity="0.6"/>
    <!-- Beak - hooked -->
    <path d="M42,-12 54,-7 48,-2 42,-1Z" fill="#2A3A4A"/>
    <path d="M42,-7 50,-5 48,-2" fill="none" stroke="#1A2A3A" stroke-width="0.6"/>
    <!-- Eye -->
    <circle cx="36" cy="-14" r="3.5" fill="#1a1a1a"/>
    <circle cx="37" cy="-15" r="1.5" fill="white"/>
    <!-- Tear marking -->
    <path d="M38,-12 Q40,-8 38,-5" fill="none" stroke="#2A3A4A" stroke-width="1" opacity="0.4"/>
  </g>
</svg>
