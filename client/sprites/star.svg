<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g transform="translate(16,16)" filter="url(#glow)">
    <!-- Outer glow -->
    <polygon points="0,-13 3,-5 11,-5 5,1 7,10 0,5 -7,10 -5,1 -11,-5 -3,-5" fill="url(#starGlow)"/>
    <!-- Inner star -->
    <polygon points="0,-9 2,-3.5 7.5,-3.5 3.5,0.5 5,7 0,3.5 -5,7 -3.5,0.5 -7.5,-3.5 -2,-3.5" fill="#FFF8DC"/>
    <!-- Center sparkle -->
    <circle cx="0" cy="0" r="1.5" fill="white" opacity="0.8"/>
  </g>
</svg>
